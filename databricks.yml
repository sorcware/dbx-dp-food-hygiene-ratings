# This is a Databricks asset bundle definition for dbx-dp-food-hygiene-ratings.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: dbx-dp-food-hygiene-ratings

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-37e2d063-7393.cloud.databricks.com


resources:
  jobs:
    ingest_food_hygiene:
      name: ingest_food_hygiene
      tasks:
        - task_key: ingest
          spark_python_task:
            python_file: src/jobs/ingest_food_hygiene.py
          environment_key: default
        - task_key: transform
          depends_on:
            - task_key: ingest
          pipeline_task:
            pipeline_id: ${resources.pipelines.food_hygiene_pipeline.id}
      environments:
        - environment_key: default
          spec:
            environment_version: "2"

  pipelines:
    food_hygiene_pipeline:
      name: food_hygiene_pipeline
      serverless: true
      catalog: workspace
      schema: fhrs
      lifecycle:
        prevent_destroy: true
      libraries:
        - file:
            path: src/pipelines/food_hygiene_bronze.py
        - file:
            path: src/pipelines/food_hygiene_silver.py